name: calyntro
services:
  gateway:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8765:80"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ui
    networks:
      - calyntro-network

  backend:
    image: ghcr.io/khreichel/calyntro-backend:latest
    container_name: calyntro-backend
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./exports:/app/export
    environment:
      - CALYNTRO_CONFIG=/app/config/config.yaml
    networks:
      - calyntro-network

  ui:
    image: ghcr.io/khreichel/calyntro-ui:latest
    container_name: calyntro-ui
    restart: unless-stopped
    networks:
      - calyntro-network

  importer:
    image: ghcr.io/khreichel/calyntro-backend:latest
    container_name: calyntro-importer
    user: "${HOST_UID}:${HOST_GID}"
    profiles:
      - tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./exports:/app/export
      - ./repo:/repo:ro
    environment:
      - HOME=/tmp
      - CALYNTRO_CONFIG=/app/config/config.yaml
    entrypoint: ["python", "/app/src/importer.py"]
    networks:
      - calyntro-network

networks:
  calyntro-network:
    driver: bridge
